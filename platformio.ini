; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; DEFAULT ENVIRONMENT: esp32c3-supermini (ESP32-C3 SuperMini) - ONLY PLATFORM

[env:esp32c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3
    zinggjm/GxEPD2 @ ^1.5.6
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.14.5
    olikraus/U8g2_for_Adafruit_GFX @ ^1.8.0
    olikraus/U8g2 @ ^2.35.0
monitor_echo = yes
monitor_filters = send_on_enter
board_build.cdc_on_boot = yes
board_build.filesystem = littlefs
build_flags =
    -DCORE_DEBUG_LEVEL=0
lib_ldf_mode = deep
board_build.partitions = partitions.csv
upload_speed = 460800
upload_protocol = esptool
upload_port = COM4

; Safer flashing options
; If you continue to see verification errors, use the `tools/flash_and_verify.py`
; script to perform robust flashing with retries and optional factory reset.
; Example (manual invocation):
;   python tools/flash_and_verify.py --port COM8 .pio/build/esp32c3-supermini/firmware.bin --erase
;
; Optional: to make PlatformIO use the script automatically, uncomment and adjust:
; upload_command = python tools/flash_and_verify.py --port $UPLOAD_PORT .pio/build/${PIOENV}/firmware.bin
